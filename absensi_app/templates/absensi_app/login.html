{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Absensi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a3a6b;
            --primary-hover: #122b52;
            --accent: #110c66;
            --accent-hover: #1a13a0;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --danger-light: #fee2e2;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--gray-900);
            background: linear-gradient(145deg, #0d0d1a 0%, #111827 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-container { max-width: 400px; width: 100%; }

        .login-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border-top: 4px solid var(--accent);
        }

        .login-banner {
            background: #0a0f1e;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #3a2a2a;
            min-height: 80px;
        }

        .login-banner img {
            height: 56px;
            object-fit: contain;
        }

        .login-header {
            padding: 20px 24px 16px;
            text-align: center;
            border-bottom: 1px solid var(--gray-200);
        }

        .login-icon {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .login-icon i { font-size: 20px; color: white; }

        .login-header h3 {
            margin: 0 0 4px;
            font-weight: 700;
            font-size: 18px;
            color: var(--gray-900);
        }

        .login-header p {
            margin: 0;
            color: var(--gray-500);
            font-size: 13px;
        }

        .login-body { padding: 24px; }

        .alert {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            border: 1px solid #f87171;
            background: var(--danger-light);
            color: #991b1b;
        }

        .alert .btn-close {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            opacity: 0.5;
            margin-left: auto;
            padding: 2px 6px;
        }

        .alert .btn-close:hover { opacity: 1; }

        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700);
        }

        .input-group {
            display: flex;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--gray-300);
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(35,26,204,0.1);
        }

        .input-group-text {
            background: var(--gray-100);
            border-right: 1px solid var(--gray-200);
            color: var(--gray-500);
            width: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: color 0.2s;
        }

        .input-group:focus-within .input-group-text {
            color: var(--accent);
        }

        .form-control {
            flex: 1;
            height: 40px;
            padding: 0 12px;
            font-size: 13px;
            border: none;
            outline: none;
            background: white;
            color: var(--gray-900);
        }

        .btn-primary {
            width: 100%;
            height: 44px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active { transform: translateY(0); }

        .login-footer {
            text-align: center;
            padding: 12px 16px;
            background: #f9fafb;
            border-top: 1px solid var(--gray-200);
            color: var(--gray-500);
            font-size: 12px;
        }

        .login-footer span { color: var(--primary); font-weight: 600; }

        @media (max-width: 576px) {
            body { padding: 16px; }
            .login-body { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">

            <div class="login-banner">
                <img src="{% static 'logo.png' %}" alt="Plaza Asia Tasikmalaya">
            </div>

            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <h3>Sistem Absensi</h3>
                <p>Silakan login untuk melanjutkan</p>
            </div>

            <div class="login-body">
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-dismissible">
                        <i class="fas fa-exclamation-circle"></i>
                        <div>{{ message }}</div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text"
                                class="form-control"
                                name="username"
                                placeholder="Masukkan username"
                                required autofocus>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password"
                                class="form-control"
                                name="password"
                                placeholder="Masukkan password"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </button>
                </form>
            </div>

            <div class="login-footer">
                &copy; 2025 <span>Plaza Asia Tasikmalaya</span> &mdash; Sistem Absensi Pegawai
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
